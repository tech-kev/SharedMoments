<!DOCTYPE html>
<html>
   <head>
      <title>SharedMoments</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta charset="UTF-8">
      <link rel="icon" type="image/png" sizes="192x192" href="/static/pwa/sm-icon-192.png">
      <link rel="apple-touch-icon" href="/static/pwa/sm-icon-192.png">
      <link href="https://cdn.jsdelivr.net/npm/beercss@3.6.13/dist/cdn/beer.min.css" rel="stylesheet">
      <script type="module" src="https://cdn.jsdelivr.net/npm/beercss@3.6.13/dist/cdn/beer.min.js"></script>
      <script type="module" src="https://cdn.jsdelivr.net/npm/material-dynamic-colors@1.1.2/dist/cdn/material-dynamic-colors.min.js"></script>
   </head>
   <body>
      <main class="responsive" style="max-width: 500px; margin: 0 auto; padding-top: 15vh;">
         <article class="primary-container" style="text-align: center;">
            <svg xmlns="http://www.w3.org/2000/svg" height="64" viewBox="0 -960 960 960" width="64" fill="currentColor"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
            <h5>SharedMoments</h5>
            <p>This shared content is password protected.</p>

            {% if error %}
            <div class="row">
               <div class="col s12">
                  <p class="error-text" style="color: var(--error);">Incorrect password. Please try again.</p>
               </div>
            </div>
            {% endif %}

            <form method="POST" action="/s/{{ token }}/verify">
               <div class="field border round">
                  <input type="password" name="password" required autofocus>
                  <label>Password</label>
               </div>
               <div class="space"></div>
               <button type="submit" class="responsive">
                  <i>lock_open</i>
                  <span>Unlock</span>
               </button>
            </form>
         </article>
      </main>
   </body>
</html>
