<style>
   /* Skeleton/Shimmer Loading */
   .skeleton {
      background: var(--surface-variant);
      overflow: hidden;
      position: relative;
   }
   .skeleton::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
      animation: shimmer 1.5s ease-in-out infinite;
   }
   .dark .skeleton::after {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
   }
   @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
   }
   .img-skeleton-wrapper {
      position: relative;
      overflow: hidden;
   }
   .img-skeleton-wrapper[data-lqip]::before {
      content: '';
      position: absolute;
      inset: -10px;
      background: var(--lqip) center/cover no-repeat;
      filter: blur(10px);
      z-index: 1;
   }
   .img-skeleton-wrapper.loaded::before {
      opacity: 0;
      transition: opacity 0.4s ease;
   }
   .img-skeleton-wrapper.loaded .skeleton-overlay {
      display: none;
   }
   .skeleton-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
   }
   .skeleton-image {
      aspect-ratio: 4/3;
   }
   .skeleton-text {
      height: 1rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
   }
   .skeleton-text.short { width: 40%; }
   .skeleton-text.medium { width: 70%; }
   .skeleton-text.long { width: 100%; }
   .skeleton-card {
      padding: 0;
      overflow: hidden;
   }
   /* Lazy Loading */
   img.lazy {
      opacity: 0;
      transition: opacity 0.4s ease;
   }
   img.lazy.lazy-loaded {
      opacity: 1;
   }
   /* PWA Sync Animation */
   @keyframes pwa-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
   }
   .pwa-syncing .outbox-ghost-card i {
      animation: pwa-spin 1s linear infinite;
   }
   .pwa-syncing #pwa-outbox-badge {
      animation: pwa-spin 1.5s linear infinite;
   }
   /* Ghostcard visual distinction */
   .outbox-ghost-card, .outbox-ghost-item {
      border-left: 3px solid var(--tertiary);
   }
</style>
